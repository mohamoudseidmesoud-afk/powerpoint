  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fritz Haber (1868–1934) — Biography</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            background-color: #e8e8e8;
            padding: 12px 20px;
            flex-shrink: 0;
            color: #000000;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid #333;
        }

        .top-bar .title { font-size: 17px; }
        .top-bar .subtitle { font-size: 11px; margin-top: 4px; color: #444; }

        /* Scrollable Timeline Area */
        .timeline-wrapper {
            flex-grow: 1;
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            cursor: grab;
            background-color: #ffffff;
        }
        .timeline-wrapper:active {
            cursor: grabbing;
        }

        .timeline-content {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            min-width: 100%;
        }

        /* SVG for connection lines */
        #connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Main Axis */
        .axis {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 18px;
            background-color: #222222;
            transform: translateY(-50%);
            z-index: 2;
        }

        .axis-label {
            position: absolute;
            color: #ffffff;
            font-size: 9px;
            line-height: 18px;
            top: 0;
            pointer-events: none;
        }

        .axis-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: #000000;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
        }

        /* Event Boxes */
        .event-box {
            position: absolute;
            width: 160px;
            background-color: #ffffff;
            border-radius: 4px;
            border-style: solid;
            border-width: 2px;
            z-index: 4;
            cursor: default;
        }

        /* Subtle interactive touch (No animation, just instant state change) */
        .event-box:hover {
            border-width: 4px;
            z-index: 10;
        }

        .event-box.top {
            bottom: calc(50% + 15px);
        }

        .event-box.bottom {
            top: calc(50% + 15px);
        }

        .event-header {
            padding: 4px 6px;
            color: #ffffff;
            border-top-left-radius: 2px;
            border-top-right-radius: 2px;
        }

        .event-date {
            font-size: 9px;
            display: block;
        }

        .event-location {
            font-size: 9px;
            font-style: italic;
            display: block;
        }

        .event-body {
            padding: 6px;
            font-size: 9px;
            line-height: 1.4;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="title">Fritz Haber (1868–1934) — The Paradox of a Genius</div>
        <div class="subtitle">By Mesoud | Euro English Class | 1ère Générale | The dual legacy of the 1918 Nobel Laureate</div>
    </div>

    <div class="timeline-wrapper" id="scroll-wrapper">
        <div class="timeline-content" id="timeline-content">
            <svg id="connections"></svg>
            <div class="axis" id="axis"></div>
        </div>
    </div>

    <script>
        // Upgraded Data : Richer vocabulary, strong historical impact, perfect for Euro Class.
        const eventsData = [
            { id: 1, year: 1868.93, side: 'DESSUS', date: 'Dec 9, 1868', location: 'Breslau, Prussia', category: 'Birth/Nobel', text: 'Born to a wealthy Jewish family. He would become one of history\'s most controversial scientists.' },
            { id: 2, year: 1892.85, side: 'DESSOUS', date: 'Nov 1892', location: 'Germany', category: 'Religion', text: 'Converts to Lutheranism to assimilate into German society and advance his academic career.' },
            { id: 3, year: 1901.21, side: 'DESSUS', date: 'Mar 15, 1901', location: 'Germany', category: 'Marriage', text: 'Marries Clara Immerwahr, a brilliant pioneer who was the first woman to earn a PhD in chemistry in Breslau.' },
            { id: 4, year: 1909.51, side: 'DESSOUS', date: 'Jul 2, 1909', location: 'Germany', category: 'Science', text: 'Perfects the Haber-Bosch process to synthesize ammonia. This breakthrough creates mass fertilizers, saving billions from famine.' },
            { id: 5, year: 1911.03, side: 'DESSUS', date: 'Jan 11, 1911', location: 'Berlin', category: 'Career', text: 'Appointed director of the prestigious Kaiser Wilhelm Institute for Physical Chemistry.' },
            { id: 6, year: 1915.31, side: 'DESSOUS', date: 'Apr 22, 1915', location: 'Ypres, Belgium', category: 'War/Tragedy', text: 'Directs the first major chlorine gas attack. He becomes known as the "Father of Chemical Warfare".' },
            { id: 7, year: 1915.34, side: 'DESSUS', date: 'May 2, 1915', location: 'Berlin', category: 'War/Tragedy', text: 'His wife Clara tragically commits suicide in protest against his horrific work on poison gas.' },
            { id: 8, year: 1917.82, side: 'DESSOUS', date: 'Oct 25, 1917', location: 'Germany', category: 'Marriage', text: 'Marries his second wife, Charlotte Nathan.' },
            { id: 9, year: 1919.87, side: 'DESSUS', date: 'Nov 1919', location: 'Stockholm', category: 'Birth/Nobel', text: 'Awarded the 1918 Nobel Prize in Chemistry. The decision sparks fierce international outrage due to his war crimes.' },
            { id: 10, year: 1927.00, side: 'DESSOUS', date: '1927', location: 'Germany', category: 'Personal', text: 'Divorces Charlotte Nathan amidst declining health and growing personal isolation.' },
            { id: 11, year: 1933.33, side: 'DESSUS', date: 'Apr 30, 1933', location: 'Germany', category: 'Death/Exile', text: 'Despite his fierce German patriotism, he is forced to resign and flee the country under Nazi antisemitic laws.' },
            { id: 12, year: 1934.04, side: 'DESSOUS', date: 'Jan 1934', location: 'Basel, Switzerland', category: 'Death/Exile', text: 'A broken exile, his health rapidly fails while traveling to seek refuge.' },
            { id: 13, year: 1934.08, side: 'DESSUS', date: 'Jan 29, 1934', location: 'Basel, Switzerland', category: 'Death/Exile', text: 'Dies at 65. The ultimate paradox: the man who pulled bread from the air also engineered mass destruction.' }
        ];

        // Color palette
        const categoryColors = {
            'Birth/Nobel': '#2196F3',
            'War/Tragedy': '#F44336',
            'Career': '#4CAF50',
            'Science': '#9C27B0',
            'Personal': '#FF9800',
            'Death/Exile': '#607D8B',
            'Marriage': '#E91E63',
            'Religion': '#795548'
        };

        const BASE_YEAR = 1868.93;
        const SCALE = 60; // 60px per year
        const OFFSET_X = 100; // Initial left margin

        // Phase 1 : Initial math calculations
        eventsData.forEach(ev => {
            ev.anchorX = OFFSET_X + (ev.year - BASE_YEAR) * SCALE;
            ev.boxX = ev.anchorX - 80; 
            ev.color = categoryColors[ev.category];
        });

        const topEvents = eventsData.filter(e => e.side === 'DESSUS');
        const bottomEvents = eventsData.filter(e => e.side === 'DESSOUS');

        // Phase 2 : Collision Algorithm (+180px shift min)
        function resolveCollisions(eventsArray) {
            for (let i = 1; i < eventsArray.length; i++) {
                const prev = eventsArray[i - 1];
                const curr = eventsArray[i];
                if (curr.boxX < prev.boxX + 180) {
                    curr.boxX = prev.boxX + 180;
                }
            }
        }
        resolveCollisions(topEvents);
        resolveCollisions(bottomEvents);

        const maxBoxX = Math.max(...eventsData.map(e => e.boxX));
        const totalWidth = maxBoxX + 260; 
        document.getElementById('timeline-content').style.width = totalWidth + 'px';
        document.getElementById('connections').style.width = totalWidth + 'px';

        const timelineContent = document.getElementById('timeline-content');
        const axis = document.getElementById('axis');
        const svg = document.getElementById('connections');
        const displayedYears = new Set();

        function renderTimeline() {
            svg.innerHTML = '';
            document.querySelectorAll('.event-box, .axis-dot, .axis-label').forEach(el => el.remove());

            const containerHeight = timelineContent.clientHeight;
            const centerY = containerHeight / 2;
            const boxOffsetFromCenter = 15; 
            
            eventsData.forEach(ev => {
                const dot = document.createElement('div');
                dot.className = 'axis-dot';
                dot.style.left = ev.anchorX + 'px';
                axis.appendChild(dot);

                const yearInt = Math.floor(ev.year);
                if (!displayedYears.has(yearInt)) {
                    displayedYears.add(yearInt);
                    const label = document.createElement('div');
                    label.className = 'axis-label';
                    label.textContent = yearInt;
                    label.style.left = (ev.anchorX + 10) + 'px'; 
                    axis.appendChild(label);
                }

                const box = document.createElement('div');
                const cssClass = ev.side === 'DESSUS' ? 'top' : 'bottom';
                box.className = `event-box ${cssClass}`;
                box.style.left = ev.boxX + 'px';
                box.style.borderColor = ev.color;

                box.innerHTML = `
                    <div class="event-header" style="background-color: ${ev.color};">
                        <span class="event-date">${ev.date}</span>
                        <span class="event-location">${ev.location}</span>
                    </div>
                    <div class="event-body">
                        ${ev.text}
                    </div>
                `;
                timelineContent.appendChild(box);

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                const x1 = ev.boxX + 80; 
                const y1 = ev.side === 'DESSUS' ? (centerY - boxOffsetFromCenter) : (centerY + boxOffsetFromCenter);
                const x2 = ev.anchorX;
                const y2 = centerY;

                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('stroke', '#000000');
                line.setAttribute('stroke-width', '1');
                
                svg.appendChild(line);
            });
        }

        window.addEventListener('load', renderTimeline);
        window.addEventListener('resize', renderTimeline);

        const wrapper = document.getElementById('scroll-wrapper');
        let isDown = false;
        let startX;
        let scrollLeft;

        wrapper.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - wrapper.offsetLeft;
            scrollLeft = wrapper.scrollLeft;
        });

        wrapper.addEventListener('mouseleave', () => { isDown = false; });
        wrapper.addEventListener('mouseup', () => { isDown = false; });

        wrapper.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - wrapper.offsetLeft;
            const walk = (x - startX) * 1.5; 
            wrapper.scrollLeft = scrollLeft - walk;
        });

        wrapper.addEventListener('wheel', (e) => {
            e.preventDefault();
            wrapper.scrollLeft += e.deltaY;
        }, { passive: false });

    </script>
</body>
</html>
    
  </body>
  
</html>
